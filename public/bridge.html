<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Identity Bridge</title>
</head>
<body>
<script>
(function () {
  'use strict';

  var KEY = '__ntrx_uid';

  function read() {
    try { return localStorage.getItem(KEY); } catch (e) { return null; }
  }

  function write(id) {
    try { localStorage.setItem(KEY, id); } catch (e) {}
  }

  /** Ensure we have storage access (Safari requires this for iframes). */
  function withStorageAccess(fn) {
    if (document.requestStorageAccess && document.hasStorageAccess) {
      document.hasStorageAccess().then(function (has) {
        if (has) { fn(); return; }
        document.requestStorageAccess().then(fn).catch(function () { fn(); });
      }).catch(function () { fn(); });
    } else {
      fn();
    }
  }

  window.addEventListener('message', function (e) {
    if (!e.data || !e.source) return;
    var msg = e.data;
    var origin = e.origin;
    var source = e.source;

    // --- RESOLVE: parent wants to READ our stored token ---
    if (msg.type === 'ntrx_resolve') {
      withStorageAccess(function () {
        var stored = read();
        if (stored) {
          // We have a token — return it (cross-site link!)
          source.postMessage({ type: 'ntrx_response', id: stored }, origin);
        } else if (msg.id) {
          // Parent has a token, we don't — adopt it for future cross-site use
          write(msg.id);
          source.postMessage({ type: 'ntrx_response', id: msg.id }, origin);
        } else {
          // Neither side has a token
          source.postMessage({ type: 'ntrx_response', id: null }, origin);
        }
      });
    }

    // --- STORE: parent wants to WRITE a token into our storage ---
    if (msg.type === 'ntrx_store' && msg.id) {
      withStorageAccess(function () {
        var existing = read();
        if (!existing) {
          // Only store if we don't already have one (first device wins)
          write(msg.id);
        }
        source.postMessage({ type: 'ntrx_stored' }, origin);
      });
    }
  });

  // Signal ready
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'ntrx_bridge_ready' }, '*');
  }
})();
</script>
</body>
</html>
