<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>shop.com — Test Page</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; background: #f9fafb; color: #1a1a1a; }
    h1 { color: #e74c3c; }
    .id-box { background: #fff; border: 2px solid #e74c3c; border-radius: 8px; padding: 20px; margin: 20px 0; font-family: monospace; font-size: 14px; word-break: break-all; }
    .status { padding: 8px 16px; border-radius: 4px; display: inline-block; margin: 8px 0; }
    .pending { background: #fef3c7; color: #92400e; }
    .resolved { background: #d1fae5; color: #065f46; }
    .info { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 6px; padding: 16px; margin: 16px 0; font-size: 14px; }
  </style>
</head>
<body>
  <h1>shop.com</h1>
  <p>This simulates a user landing on <strong>shop.com</strong>.</p>

  <div class="status pending" id="status">Resolving identity...</div>

  <div class="id-box" id="id-display">Waiting...</div>

  <div class="info">
    <strong>Open the browser console</strong> to see the <code>ID: ntrx_...</code> output.<br><br>
    Then open <a href="test-crow.html">crow.com (test)</a> or
    <a href="test-pewpie.html">pewpie.com (test)</a> in the same browser.
    The ID should be identical.
  </div>

  <!-- THIS IS THE SINGLE SCRIPT TAG — the deliverable -->
  <script src="/id-generator.js"></script>

  <script>
    window.addEventListener('ntrx:identified', function(e) {
      document.getElementById('id-display').textContent = e.detail.id;
      var st = document.getElementById('status');
      st.textContent = 'Identity resolved';
      st.className = 'status resolved';
    });
  </script>
</body>
</html>
